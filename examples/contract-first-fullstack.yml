# Contract-First Fullstack: spec the API, build both sides concurrently, verify against the contract.
#
# No "command:" needed — cli.backend handles invocation automatically.
#
# Usage:
#   cargo run -p boring-cli -- run -c examples/contract-first-fullstack.yml \
#     -p "Build a REST API for a bookmark manager with CRUD endpoints and a vanilla JS frontend"

event_loop:
  starting_event: spec.start
  completion_promise: LOOP_COMPLETE
  max_iterations: 20
  max_runtime_seconds: 1200

cli:
  backend: claude

core:
  guardrails:
    - "The API contract in .boring/scratchpad/shared.md is the source of truth."
    - "Frontend and backend MUST NOT depend on each other's implementation — only on the contract."
    - "Read .boring/prompt.md for the feature requirements."

hats:
  spec_writer:
    name: API Contract Writer
    description: "Drafts the API contract from requirements"
    triggers: ["spec.start", "spec.rejected"]
    publishes: ["spec.ready"]
    instructions: |
      Read the task requirements from the event payload.

      Draft an API contract. For each endpoint specify:
      - Method + path
      - Request body schema (with types)
      - Response schema (with types)
      - Error responses

      Output each line of the contract prefixed with BORING_SCRATCHPAD so it's saved.

      When done: BORING_EMIT spec.ready contract drafted

      If this is a spec.rejected event, revise based on the feedback.

  spec_reviewer:
    name: Contract Reviewer
    description: "Reviews the API contract for completeness"
    triggers: ["spec.ready"]
    publishes: ["spec.approved", "spec.rejected"]
    instructions: |
      Review the API contract.

      Check: are all operations covered, are schemas complete, are errors handled,
      is it unambiguous enough for independent implementation?

      If issues: BORING_EMIT spec.rejected <feedback>
      If solid: BORING_EMIT spec.approved

  backend_builder:
    name: Backend Builder
    description: "Implements the backend API from the contract"
    triggers: ["spec.approved", "backend.fix"]
    publishes: ["backend.done"]
    instructions: |
      Implement the backend API matching the contract exactly.
      In-memory storage is fine. Include error handling.
      Do NOT depend on frontend code — only the contract.

      If this is a backend.fix event, fix what the verifier found wrong.

      When done: BORING_EMIT backend.done

  frontend_builder:
    name: Frontend Builder
    description: "Implements the frontend from the contract"
    triggers: ["spec.approved", "frontend.fix"]
    publishes: ["frontend.done"]
    instructions: |
      Implement the frontend matching the API contract.
      Build API client functions for every endpoint.
      Do NOT depend on backend code — only the contract.

      If this is a frontend.fix event, fix what the verifier found wrong.

      When done: BORING_EMIT frontend.done

  verifier:
    name: Contract Verifier
    description: "Tests both implementations against the contract"
    triggers: ["backend.done", "frontend.done"]
    publishes: ["backend.fix", "frontend.fix"]
    instructions: |
      Verify implementations conform to the API contract.

      Check backend endpoints, frontend API client, schema match.

      If backend broken: BORING_EMIT backend.fix <what's wrong>
      If frontend broken: BORING_EMIT frontend.fix <what's wrong>
      If both conform: LOOP_COMPLETE
