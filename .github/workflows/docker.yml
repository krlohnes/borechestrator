name: Build and Push Docker Images

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  AGENT_IMAGE: ghcr.io/${{ github.repository }}/agent
  CONTROLLER_IMAGE: ghcr.io/${{ github.repository }}/controller

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version tag
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.agent
          push: true
          tags: |
            ${{ env.AGENT_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.AGENT_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push controller image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.controller
          push: true
          tags: |
            ${{ env.CONTROLLER_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.CONTROLLER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
