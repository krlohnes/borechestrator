apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "borechestrator.fullname" . }}-config
  labels:
    {{- include "borechestrator.labels" . | nindent 4 }}
data:
  borechestrator.yml: |
    {{- if .Values.config.content }}
    {{ .Values.config.content | nindent 4 }}
    {{- else }}
    # Provide config via --set config.content or mount your own ConfigMap
    event_loop:
      starting_event: work.start
      completion_promise: LOOP_COMPLETE
    cli:
      backend: claude
    hats:
      worker:
        name: Worker
        description: "Default worker"
        triggers: ["work.start"]
        publishes: []
        instructions: "Complete the task."
    {{- end }}
