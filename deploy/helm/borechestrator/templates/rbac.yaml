{{- if .Values.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "borechestrator.fullname" . }}
  labels:
    {{- include "borechestrator.labels" . | nindent 4 }}
rules:
  # Need to create and watch Jobs for hat execution
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Need to read pod logs
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Need to read secrets for from_secret resolution
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "borechestrator.fullname" . }}
  labels:
    {{- include "borechestrator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "borechestrator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "borechestrator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
